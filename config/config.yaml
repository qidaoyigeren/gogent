server:
  port: 9090
  context-path: /api/ragent

database:
  driver: postgres
  dsn: "host=127.0.0.1 port=5432 user=postgres password=postgres dbname=ragent sslmode=disable"
  max-open-conns: 10
  max-idle-conns: 5
  conn-max-lifetime: 1800s

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0


milvus:
  uri: "http://localhost:19530"

rag:
  vector:
    type: pg  # milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  mcp:
    servers:
      - name: default
        url: "http://localhost:9099"

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

ai:
  providers:
    ollama:
      url: "http://localhost:11434"
      api-key: ""
      endpoints:
        chat: /api/chat
        embedding: /api/embed
    bailian:
      url: "https://dashscope.aliyuncs.com"
      api-key: "sk-4d3f978ea0104424b8d50fdec8e70b07"
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: "https://api.siliconflow.cn"
      api-key: "sk-zpkeahpaqvqgryqhfmszsasucpdxugyqlybclcqnrpnzjjgb"
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen-plus
    deep-thinking-model: qwen3-sf
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus
        priority: 0
      - id: qwen3-sf
        provider: siliconflow
        model: Qwen/Qwen3-8B
        supports-thinking: true
        priority: 1
      - id: glm-4
        provider: siliconflow
        model: THUDM/GLM-4-9B-0414
        priority: 2
      # ollama disabled (not running)
      # - id: qwen3-local
      #   provider: ollama
      #   model: qwen3:8b-fp16
      #   priority: 3

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: 1536
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: 1536
        priority: 2

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100
